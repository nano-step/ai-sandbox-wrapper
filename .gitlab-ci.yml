variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  # Default: all tools. Override in CI/CD settings or pipeline trigger.
  TOOLS: "amp,opencode,claude,droid,gemini,kilo,qwen,codex,aider,qoder,auggie,codebuddy,jules,shai"

stages:
  - build

services:
  - name: docker:24.0.5-dind
    alias: docker
    command: ["--tls=false"]

before_script:
  - apk add --no-cache bash curl jq
  - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

build_sandbox:
  stage: build
  image: docker:24.0.5
  script:
    - echo "Building unified sandbox image with tools: $TOOLS"
    - TOOLS="$TOOLS" bash lib/build-sandbox.sh
    - docker tag ai-sandbox:latest $CI_REGISTRY_IMAGE/ai-sandbox:latest
    - echo "Verifying tools in image..."
    - |
      set +e
      IFS=',' read -ra TOOL_ARRAY <<< "$TOOLS"
      FAILED=0
      for tool in "${TOOL_ARRAY[@]}"; do
        tool=$(echo "$tool" | tr -d ' ')
        # Skip openclaw (uses docker-compose, not in image)
        [ "$tool" = "openclaw" ] && continue
        echo "Checking $tool..."
        docker run --rm ai-sandbox:latest "$tool" --version 2>&1 | head -3 || \
        docker run --rm ai-sandbox:latest "$tool" --help 2>&1 | head -5 || \
        { echo "WARNING: $tool verification failed"; FAILED=$((FAILED+1)); }
      done
      if [ $FAILED -gt 0 ]; then
        echo "WARNING: $FAILED tool(s) failed verification (non-blocking)"
      fi
      set -e
    - echo "Pushing image..."
    - docker push $CI_REGISTRY_IMAGE/ai-sandbox:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - changes:
        - lib/**
        - dockerfiles/**
        - setup.sh
      when: always
    - when: never
