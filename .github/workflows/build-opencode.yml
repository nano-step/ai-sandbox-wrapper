name: Build & Publish ai-opencode

on:
  push:
    branches: [master]
    paths:
      - "lib/install-base.sh"
      - "lib/install-opencode.sh"
      - "skills/rtk/**"
      - "skills/rtk-setup/**"
      - "skills/dd-pup/**"
      - "scripts/od-status"
      - "scripts/od-health"
      - "ci/presets/*.env"
      - ".github/workflows/build-image.yml"
      - ".github/workflows/build-opencode.yml"
      - "dockerfiles/opencode/**"
      - "dockerfiles/base/**"
  workflow_dispatch: {}

jobs:
  build-base:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-image.yml
    with:
      tool: opencode
      preset: base
    secrets: inherit

  build-full:
    needs: build-base
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-image.yml
    with:
      tool: opencode
      preset: full
    secrets: inherit
