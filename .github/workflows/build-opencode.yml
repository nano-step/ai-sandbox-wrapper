name: Build & Publish ai-opencode

on:
  push:
    branches: [master]
    paths:
      - "lib/install-base.sh"
      - "lib/install-opencode.sh"
      - "skills/rtk/**"
      - "skills/rtk-setup/**"
      - "skills/dd-pup/**"
      - "scripts/od-status"
      - "scripts/od-health"
      - "ci/presets/*.env"
      - ".github/workflows/build-image.yml"
      - ".github/workflows/build-opencode.yml"
      - "dockerfiles/opencode/**"
      - "dockerfiles/base/**"
  workflow_dispatch:
    inputs:
      preset:
        description: "Which preset to build (leave empty for all)"
        required: false
        type: choice
        default: ""
        options:
          - ""
          - base
          - full

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        preset: [base, full]
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.preset == '' ||
      github.event.inputs.preset == matrix.preset
    uses: ./.github/workflows/build-image.yml
    with:
      tool: opencode
      preset: ${{ matrix.preset }}
    secrets: inherit
