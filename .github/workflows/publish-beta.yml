name: Publish Beta

on:
  push:
    branches: [beta]

jobs:
  publish:
    uses: nano-step/shared-workflows/.github/workflows/publish-beta.yml@v1
    permissions:
      contents: write
    with:
      package-name: "@kokorolx/ai-sandbox-wrapper"
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
