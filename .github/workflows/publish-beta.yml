name: Publish Beta

on:
  push:
    branches: [beta, develop]

concurrency:
  group: publish-beta-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    permissions:
      contents: write
    uses: nano-step/shared-workflows/.github/workflows/publish-beta.yml@v1
    with:
      package-name: "@kokorolx/ai-sandbox-wrapper"
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
