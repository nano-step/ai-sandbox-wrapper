name: CI

# Lint only. Image builds moved to build-opencode.yml (and future per-tool
# caller workflows) which push to ghcr.io. See openspec/changes/publish-opencode-image-ghcr/.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    uses: nano-step/shared-workflows/.github/workflows/lint.yml@v1
    with:
      shellcheck-dirs: "lib"
