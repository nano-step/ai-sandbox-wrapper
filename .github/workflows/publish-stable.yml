# Publish Stable — fires on push to master
#
# Auto version bump via Conventional Commits:
#   feat!: / BREAKING CHANGE  → major (1.x.x → 2.0.0)
#   feat:                     → minor (1.2.x → 1.3.0)
#   fix: / chore: / others    → patch (1.2.3 → 1.2.4)
#
# Skip conditions (no publish, no bump):
#   - Last commit message contains [skip ci]
#   - All new commits are bot housekeeping (CHANGELOG update, version bump)
#
# Prerequisites (one-time repo setup):
#   Repo/Org Settings → Secrets → NPM_TOKEN (npm automation token)

name: Publish Stable

on:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT so the bot commit triggers CI on the next push
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install --ignore-scripts

      # ── 1. Guard: skip if this push is from the bot itself ──────────────
      - name: Check if bot commit
        id: guard
        run: |
          LAST_MSG=$(git log -1 --pretty=format:"%s")
          LAST_AUTHOR=$(git log -1 --pretty=format:"%an")
          echo "last_msg=$LAST_MSG"
          echo "last_author=$LAST_AUTHOR"

          if echo "$LAST_MSG" | grep -qE '\[skip ci\]'; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "reason=commit contains [skip ci]" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ "$LAST_AUTHOR" == "github-actions[bot]" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "reason=bot commit — avoid infinite loop" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "skip=false" >> $GITHUB_OUTPUT

      # ── 2. Detect bump type from commits since last stable tag ───────────
      - name: Detect semver bump
        id: bump
        if: steps.guard.outputs.skip == 'false'
        run: |
          LAST_TAG=$(git tag --list 'v*' --sort=-version:refname \
            | grep -v 'beta' | head -1 || echo "")

          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          echo "Scanning commits in range: ${RANGE}"

          BUMP="patch"

          # Check for breaking change → major
          if git log $RANGE --pretty=format:"%s %b" --no-merges \
              | grep -qE '(BREAKING CHANGE|^feat!|^fix!|^refactor!)'; then
            BUMP="major"
          # Check for feat → minor (only if not already major)
          elif git log $RANGE --pretty=format:"%s" --no-merges \
              | grep -qE '^feat(\(.+\))?:'; then
            BUMP="minor"
          fi

          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
          echo "range=$RANGE" >> $GITHUB_OUTPUT
          echo "Detected bump: $BUMP"

      # ── 3. Bump version in package.json ─────────────────────────────────
      - name: Bump version
        id: version
        if: steps.guard.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # npm version writes package.json and creates a git tag
          NEW_VERSION=$(npm version ${{ steps.bump.outputs.bump }} --no-git-tag-version)
          # npm version returns "vX.Y.Z" — strip the leading v
          NEW_VERSION="${NEW_VERSION#v}"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped to: $NEW_VERSION"

      # ── 4. Generate changelog ────────────────────────────────────────────
      - name: Generate changelog
        id: changelog
        if: steps.guard.outputs.skip == 'false'
        run: |
          RANGE="${{ steps.bump.outputs.range }}"

          feat=$(git log $RANGE --pretty=format:"%s" --no-merges \
            | grep -E "^feat(\(.+\))?:" | sed 's/^/- /' || true)
          fix=$(git log $RANGE --pretty=format:"%s" --no-merges \
            | grep -E "^fix(\(.+\))?:" | sed 's/^/- /' || true)
          docs=$(git log $RANGE --pretty=format:"%s" --no-merges \
            | grep -E "^docs(\(.+\))?:" | sed 's/^/- /' || true)
          refactor=$(git log $RANGE --pretty=format:"%s" --no-merges \
            | grep -E "^refactor(\(.+\))?:" | sed 's/^/- /' || true)
          chore=$(git log $RANGE --pretty=format:"%s" --no-merges \
            | grep -E "^chore(\(.+\))?:" \
            | grep -v "bump version" \
            | grep -v "update CHANGELOG" \
            | grep -v "\[skip ci\]" \
            | sed 's/^/- /' || true)
          breaking=$(git log $RANGE --pretty=format:"%s %b" --no-merges \
            | grep -E "BREAKING CHANGE" | sed 's/^/- /' || true)

          body=""
          [ -n "$breaking" ] && body+=$'### ⚠ Breaking Changes\n'"$breaking"$'\n\n'
          [ -n "$feat" ]     && body+=$'### Added\n'"$feat"$'\n\n'
          [ -n "$fix" ]      && body+=$'### Fixed\n'"$fix"$'\n\n'
          [ -n "$refactor" ] && body+=$'### Changed\n'"$refactor"$'\n\n'
          [ -n "$docs" ]     && body+=$'### Documentation\n'"$docs"$'\n\n'
          [ -n "$chore" ]    && body+=$'### Other\n'"$chore"$'\n\n'
          [ -z "$body" ]     && body="_No notable changes_"

          echo "$body" > /tmp/changelog_body.md
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$body" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── 5. Update CHANGELOG.md ───────────────────────────────────────────
      - name: Update CHANGELOG.md
        if: steps.guard.outputs.skip == 'false'
        run: |
          python3 << 'PYEOF'
          import os
          from datetime import date

          version = os.environ['VERSION']
          today = date.today().strftime('%Y-%m-%d')

          with open('/tmp/changelog_body.md') as f:
              body = f.read().strip()

          install_line = f"**Install:** `npm install @kokorolx/ai-sandbox-wrapper@{version}`"
          new_entry = f"## [{version}] - {today}\n\n{body}\n\n{install_line}\n\n"

          with open('CHANGELOG.md') as f:
              content = f.read()

          marker = 'All notable changes to this project will be documented in this file.'
          marker_idx = content.find(marker)
          if marker_idx == -1:
              insert_pos = content.find('\n') + 1
          else:
              after_marker = marker_idx + len(marker)
              insert_pos = after_marker
              while insert_pos < len(content) and content[insert_pos] == '\n':
                  insert_pos += 1

          first_entry = content.find('\n## [', insert_pos - 1)
          if first_entry == -1:
              first_entry = content.find('## [', insert_pos)
              if first_entry == -1:
                  content = content + '\n' + new_entry
              else:
                  content = content[:first_entry] + new_entry + content[first_entry:]
          else:
              content = content[:first_entry + 1] + new_entry + content[first_entry + 1:]

          with open('CHANGELOG.md', 'w') as f:
              f.write(content)
          PYEOF
        env:
          VERSION: ${{ steps.version.outputs.version }}

      # ── 6. Commit package.json + CHANGELOG, tag, push ───────────────────
      - name: Commit version bump and push tag
        if: steps.guard.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git add package.json CHANGELOG.md
          git commit -m "chore: bump version to v${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin master --follow-tags

      # ── 7. Publish to npm ────────────────────────────────────────────────
      - name: Publish to npm @latest
        if: steps.guard.outputs.skip == 'false'
        run: npm publish --tag latest --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── 8. Create GitHub release ─────────────────────────────────────────
      - name: Create GitHub release
        if: steps.guard.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const body = `${{ steps.changelog.outputs.body }}`;
            const tag = `v${version}`;
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              console.log(`Release ${tag} already exists — skipping`);
            } catch (e) {
              if (e.status !== 404) throw e;
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `ai-sandbox-wrapper v${version}`,
                body: `${body}\n---\n\n**Install:** \`npm install @kokorolx/ai-sandbox-wrapper@latest\``,
                prerelease: false,
                target_commitish: context.sha,
              });
            }
